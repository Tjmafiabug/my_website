[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/story.html"
  to = "/story"
  status = 301

[[redirects]]
  from = "/journey.html"
  to = "/journey"
  status = 301

[[redirects]]
  from = "/gallery.html"
  to = "/gallery"
  status = 301

[[redirects]]
  from = "/blog.html"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/contact.html"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/posts/2026-03-30.html"
  to = "/posts/2026-03-30"
  status = 301

[[redirects]]
  from = "/posts/2026-04-06.html"
  to = "/posts/2026-04-06"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
